version: 2
updates:
  # Keep npm dependencies patched; group runtime and dev deps to reduce PR noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"
  # Keep GitHub Actions pinned versions current (supply-chain hygiene).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
