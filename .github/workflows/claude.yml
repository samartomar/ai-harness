# Claude Code GitHub Action — lets you delegate jobs to an AI agent by commenting
# "@claude <task>" on an issue or PR. The agent works on a fresh checkout and
# opens/updates a PR.
#
# SETUP (one-time):
#   Canonical:  run `claude /install-github-app` in a terminal — it installs the
#               GitHub App and provisions the API-key secret for you.
#   Manual:     add a repo secret ANTHROPIC_API_KEY
#               (Settings → Secrets and variables → Actions). Some action versions
#               accept `claude_code_oauth_token` instead — adjust `with:` to match.
#   Verify the pinned action ref below against the latest release of
#   anthropics/claude-code-action before relying on it.

name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# Default the workflow token to read-only; the claude job below re-requests the
# writes it needs at job level (OpenSSF Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  claude:
    # PUBLIC REPO GUARD: only trusted authors (owner/member/collaborator) can
    # trigger the agent. Without this, anyone commenting "@claude" on an issue/PR
    # could run it with write permissions + the API key.
    if: >-
      (contains(github.event.comment.body, '@claude') ||
       contains(github.event.issue.body, '@claude')) &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR' ||
       github.event.issue.author_association == 'OWNER' ||
       github.event.issue.author_association == 'MEMBER' ||
       github.event.issue.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@6c0083bb7289c31716797a039b6367b3079cc46e # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
