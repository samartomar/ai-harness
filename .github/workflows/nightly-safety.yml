name: nightly-safety

on:
  schedule:
    - cron: "23 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Create evidence directory
        run: mkdir -p .aih/nightly-safety
      - name: AI runtime inventory
        run: npm run check:ai-runtime -- --json > .aih/nightly-safety/ai-runtime-inventory.json
      - name: BUGBOUNTY report summary
        run: npm run check:bugbounty-report -- --json > .aih/nightly-safety/bugbounty-report.json
      - name: Docs lint
        run: npm run docs:lint
      - name: Tracked artifact guard
        run: npm run check:artifacts
      - name: Upload nightly evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nightly-safety-${{ github.run_id }}
          path: .aih/nightly-safety/
          if-no-files-found: error

