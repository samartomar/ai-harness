# OpenSSF Scorecard — scores the repo's supply-chain security posture (branch
# protection, pinned deps, token permissions, dangerous workflows, …) and uploads
# results to the Security tab + the public OSSF API that backs the README badge.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF result to the Security tab
      id-token: write # publish results to OSSF (powers the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: results.sarif
