# Cut a GitHub Release when a v* tag is pushed. Verifies the gates (typecheck,
# lint, test+coverage, build), then PACKS a verifiable install artifact (tarball +
# SHA256 checksum), smoke-installs it, and attaches it to the Release so an
# enterprise user can tie the installed package back to the reviewed tag. Does NOT
# publish to npm — that is a separate, deliberate decision (see CHANGELOG).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify (typecheck · lint · test+coverage · build)
        run: |
          npx tsc --noEmit
          npx biome ci src tests
          npx vitest run --coverage
          npx tsup
      - name: Pack tarball + SHA256 checksum
        run: |
          set -euo pipefail
          npm pack
          sha256sum ./*.tgz | tee SHA256SUMS.txt
      - name: Smoke-install the packed tarball
        run: |
          set -euo pipefail
          tarball="$(ls "$GITHUB_WORKSPACE"/*.tgz)"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null
          npm install "$tarball"
          npx aih --version
          npx aih --help | head -n 3
      - name: Create GitHub Release (with verifiable artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes \
            ./*.tgz SHA256SUMS.txt
