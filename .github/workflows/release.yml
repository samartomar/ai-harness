# Cut a GitHub Release when a v* tag is pushed. Verifies the gates (typecheck,
# lint, test, build) first so a broken tag never ships, then creates the Release
# with auto-generated notes. Does NOT publish to npm — that is a separate,
# deliberate decision (see CHANGELOG / package distribution).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release for the tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify (typecheck · lint · test · build)
        run: |
          npx tsc --noEmit
          npx biome ci src tests
          npx vitest run
          npx tsup
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
