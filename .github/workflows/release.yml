# Cut a GitHub Release when a v* tag is pushed. Verifies the gates (typecheck,
# lint, test+coverage, build), then PACKS a verifiable install artifact (tarball +
# SHA256 checksum + SPDX SBOM), generates a GitHub build-provenance attestation
# (keyless, via OIDC), smoke-installs it, publishes the same tarball to npm through
# Trusted Publishing with provenance, and attaches everything to the Release.
#
# npm Trusted Publisher config (npmjs.com): repository samartomar/ai-harness,
# workflow .github/workflows/release.yml, environment npm-publish.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@aihq/harness
    permissions:
      contents: write # create the GitHub Release for the tag
      id-token: write # keyless signing identity for the provenance attestation
      attestations: write # record the build-provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - name: Assert package version matches the tag
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$ver" != "$tag" ]; then
            echo "::error::package.json version ($ver) does not match tag $GITHUB_REF_NAME"
            exit 1
          fi
          echo "version $ver matches tag $GITHUB_REF_NAME"
      - name: Verify (typecheck · lint · test+coverage · build)
        run: |
          npm run check:artifacts
          npm run check:ecc-installer
          npx tsc --noEmit
          npx biome ci src tests
          npx vitest run --coverage
          npx tsup
      - name: Pack tarball + SHA256 checksum
        run: |
          set -euo pipefail
          npm pack
          sha256sum ./*.tgz | tee SHA256SUMS.txt
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          artifact-name: aih-sbom.spdx.json
          format: spdx-json
          output-file: aih-sbom.spdx.json
      - name: Attest build provenance for the tarball
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "./*.tgz"
      # Attach VERIFIABLE signature files to the Release itself (not only the
      # attestation store): a keyless cosign SIGNATURE BUNDLE over SHA256SUMS.txt
      # (cosign v3 new-bundle-format — one .sigstore.json carrying signature +
      # certificate; the v2 --output-signature/--output-certificate flags are
      # deprecated no-ops there and broke the v0.6.0 run) plus the build-provenance
      # bundle. Consumers verify with
      #   cosign verify-blob --bundle SHA256SUMS.txt.sigstore.json \
      #     --certificate-identity-regexp 'github.com/samartomar/ai-harness' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     SHA256SUMS.txt
      # (also what OpenSSF Scorecard's Signed-Releases check looks for).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign SHA256SUMS (keyless, GitHub OIDC)
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle SHA256SUMS.txt.sigstore.json \
            SHA256SUMS.txt
          cp "${{ steps.attest.outputs.bundle-path }}" provenance.intoto.jsonl
      - name: Smoke-install the packed tarball
        run: |
          set -euo pipefail
          tarball="$(ls "$GITHUB_WORKSPACE"/*.tgz)"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null
          npm install "$tarball"
          npx aih --version
          npx aih --help | head -n 3
      - name: Publish to npm with trusted publishing
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          case "$ver" in
            *-*) tag=next ;;   # prerelease (e.g. 0.3.0-rc.1) → next, never latest
            *)   tag=latest ;;
          esac
          echo "publishing $ver to dist-tag $tag"
          npm publish ./*.tgz --provenance --access public --tag "$tag"
      - name: Create GitHub Release (with verifiable artifacts)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes \
            ./*.tgz SHA256SUMS.txt SHA256SUMS.txt.sigstore.json \
            provenance.intoto.jsonl aih-sbom.spdx.json
