name: baseline-evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vet-once:
    runs-on: ubuntu-latest
    steps:
      - name: Check out ai-harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check out exact ECC baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: samartomar/ECC
          ref: fd3699d65c4767acceac59069847f04122417dcb
          path: .baseline-sources/ecc
          persist-credentials: false
      - name: Check out exact Superpowers baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: obra/Superpowers
          ref: d884ae04edebef577e82ff7c4e143debd0bbec99
          path: .baseline-sources/superpowers
          persist-credentials: false
      - name: Re-vet exact pins and fail on evidence drift
        run: >-
          npm run baseline:check --
          --ecc-root .baseline-sources/ecc
          --superpowers-root .baseline-sources/superpowers
      - name: Upload baseline evidence report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-evidence-lock
          path: src/baseline-evidence/vendor-lock.json
          if-no-files-found: error
