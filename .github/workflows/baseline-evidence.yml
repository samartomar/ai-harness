name: baseline-evidence

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vet-once:
    runs-on: ubuntu-latest
    steps:
      - name: Check out ai-harness
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Check out pinned SkillSpector analyzer
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NVIDIA/SkillSpector
          ref: 326a2b489411a20ed742ff13701be39ba00063c8
          path: .baseline-tools/skillspector
          persist-credentials: false
      - name: Build and verify pinned SkillSpector image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --provenance=false \
            --build-arg SOURCE_DATE_EPOCH=1782883813 \
            -f tools/skillspector.Dockerfile \
            -t skillspector:aih-326a2b489411 \
            .baseline-tools/skillspector
          digest="$(docker image inspect skillspector:aih-326a2b489411 --format '{{.Id}}')"
          test "$digest" = "sha256:ee8a107dfd1c258e0afed303016a4220d174ba54bd1510bf73ed91f2825075ec"
      - name: Set up pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.14"
      - name: Cache and verify pinned Cisco skill-scanner
        shell: bash
        run: |
          set -euo pipefail
          uvx --no-python-downloads --no-env-file \
            --from 'cisco-ai-skill-scanner==2.0.12' skill-scanner --version
          version="$(uvx --offline --no-python-downloads --no-env-file \
            --from 'cisco-ai-skill-scanner==2.0.12' skill-scanner --version)"
          test "$version" = "skill-scanner 2.0.12"
      - name: Check out exact ECC baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: samartomar/ECC
          ref: 16563d4a30f17d097cc4629f6d97e02adf823016
          path: .baseline-sources/ecc
          persist-credentials: false
      - name: Check out exact Superpowers baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: obra/Superpowers
          ref: d884ae04edebef577e82ff7c4e143debd0bbec99
          path: .baseline-sources/superpowers
          persist-credentials: false
      - name: Re-vet exact pins and fail on evidence drift
        run: >-
          npm run baseline:check --
          --ecc-root .baseline-sources/ecc
          --superpowers-root .baseline-sources/superpowers
      - name: Upload baseline evidence report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: baseline-evidence-lock
          path: src/baseline-evidence/vendor-lock.json
          if-no-files-found: error
