name: semver-label

# The release cut computes the version from the semver:* labels on the PRs merged
# since the previous tag (RELEASING.md, VERSIONING.md). A merged PR with zero or
# multiple labels silently corrupts that computation, so the label is required at
# merge time — while the author still remembers what the change does.

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  semver-label:
    runs-on: ubuntu-latest
    steps:
      - name: Require exactly one semver:* label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Read labels from the API, not the event payload: the payload is a snapshot
          # from when the event fired and goes stale on rapid label edits.
          mapfile -t labels < <(
            gh api "repos/${REPO}/pulls/${PR_NUMBER}" \
              --jq '.labels[].name | select(startswith("semver:"))'
          )
          count=${#labels[@]}

          if [ "$count" -eq 0 ]; then
            # Applying a label needs triage permission, which contributors from a fork do
            # not have. This check is addressed to whoever merges, not to the author.
            echo "::error::No semver:* label yet. External contributors: no action needed — a maintainer applies the label before merge, and this check re-runs automatically."
            echo "Maintainers: add exactly one of semver:patch, semver:minor, or semver:major."
            echo "  patch = fixes/hardening with no observable behavior change;"
            echo "  minor = new capability, or any gate/verdict/exit-code/artifact change (even in a fix: commit);"
            echo "  major = breaking CLI, config, schema, or evidence format."
            echo "See VERSIONING.md."
            exit 1
          fi

          if [ "$count" -gt 1 ]; then
            echo "::error::Multiple semver:* labels (${labels[*]}). Exactly one is authoritative — the release cut takes the highest class across PRs, not within one."
            exit 1
          fi

          case "${labels[0]}" in
            semver:patch|semver:minor|semver:major) ;;
            *)
              echo "::error::Unknown semver label '${labels[0]}'. Allowed: semver:patch, semver:minor, semver:major."
              exit 1
              ;;
          esac

          echo "OK: ${labels[0]}"
          echo "### semver label: \`${labels[0]}\`" >> "$GITHUB_STEP_SUMMARY"
