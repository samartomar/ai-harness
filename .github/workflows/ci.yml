name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    # Cross-platform matrix: the harness ships per-OS adapters (certs, hardware,
    # vdi, profile) whose behavior must not regress on Windows/macOS unnoticed.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Tracked artifact guard
        run: npm run check:artifacts
      - name: ECC installer package check
        run: npm run check:ecc-installer
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint & format check
        if: matrix.os == 'ubuntu-latest' # biome is OS-independent — run once
        run: npx biome ci src tests
      # Enforce the coverage thresholds on one OS (deterministic line/branch hits);
      # the other OSes run the suite to validate cross-platform behavior.
      - name: Test + coverage gate
        if: matrix.os == 'ubuntu-latest'
        run: npx vitest run --coverage
      # Tokenless upload works for public repos; installing the Codecov GitHub
      # App (or a CODECOV_TOKEN secret) upgrades reliability. Never fails CI —
      # the coverage GATE is the vitest thresholds above, not the upload.
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
      - name: Test
        if: matrix.os != 'ubuntu-latest'
        run: npx vitest run
      - name: Build
        run: npx tsup
      - name: Check installable baseline
        run: npm run check:baseline-installable
