<rect x="190" y="360" width="860" height="78" rx="18" fill="#0f172a"/>
<text x="220" y="394" fill="#e5e7eb" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Operating principle</text>
<text x="220" y="424" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="15">The governed path should be fast: local first, dry-run first, evidence ready before review.</text>
