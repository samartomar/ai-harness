<text x="775" y="228" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Gate execution</text>
<text x="775" y="258" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">dry-run, dirty tree, local</text>
<text x="775" y="276" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">actions</text>
